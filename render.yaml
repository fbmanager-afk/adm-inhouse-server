services:
  - type: web
    name: adm-inhouse-server
    env: python
    buildCommand: echo ready
    startCommand: python app.py
    envVars:
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_USER
        sync: false
      - key: GITHUB_REPO
        value: adm-intel
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: PORT
        value: 8080
